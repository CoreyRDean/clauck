name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (bash scripts)
        run: |
          shellcheck --severity=error \
            install.sh uninstall.sh \
            lib/update-check.sh \
            plugins/clauck/hooks/sessionstart.sh \
            plugins/clauck/bin/clauck-mcp-launcher
          echo "shellcheck passed"

      - name: Bash 3.2 compatibility check
        run: |
          # Detect bash 4+ features that break macOS's system bash (3.2):
          #   ${var,,} / ${var^^}  — case-modification expansion (bash 4+)
          #   mapfile / readarray  — bash 4+
          #   declare -A           — associative arrays (bash 4+)
          if grep -rEn \
              '\$\{[a-zA-Z_][a-zA-Z0-9_]*,,\}|\$\{[a-zA-Z_][a-zA-Z0-9_]*\^\^\}|(^|[[:space:]])(mapfile|readarray)[[:space:]]|declare[[:space:]]+-[a-zA-Z]*A([[:space:]]|=)' \
              install.sh uninstall.sh lib/update-check.sh \
              plugins/clauck/hooks/sessionstart.sh plugins/clauck/bin/clauck-mcp-launcher \
            | grep -v '^[^:]*:[[:digit:]]*:[[:space:]]*#'; then
            echo "ERROR: bash 4+ syntax found — incompatible with macOS bash 3.2" >&2
            exit 1
          fi
          echo "No bash 4+ syntax detected"

      - name: Python linting (ruff)
        run: |
          pip install ruff --quiet
          ruff check --select=E9,F lib/scheduler.py lib/dag-runner.py lib/clauck lib/sizing.py
          echo "ruff passed"

      - name: Plugin + marketplace version drift check
        run: |
          # The plugin hook's drift reconciliation reads `version` from
          # plugin.json. The marketplace registry also carries a version for
          # each plugin entry. Both must match the repo's VERSION file (the
          # single source of truth) — otherwise CC's marketplace cache will
          # serve one version while the hook thinks it's another, and users
          # get spurious self-heal invocations every session.
          VERSION_FILE=$(tr -d '[:space:]' < VERSION | sed 's/^v//')
          PLUGIN_VERSION=$(/usr/bin/python3 -c "import json; print(json.load(open('plugins/clauck/.claude-plugin/plugin.json'))['version'])")
          MARKETPLACE_VERSION=$(/usr/bin/python3 -c "
import json
m = json.load(open('.claude-plugin/marketplace.json'))
for p in m.get('plugins', []):
    if p.get('name') == 'clauck':
        print(p.get('version', ''))
        break
")
          echo "VERSION file:       $VERSION_FILE"
          echo "plugin.json:        $PLUGIN_VERSION"
          echo "marketplace.json:   $MARKETPLACE_VERSION"
          if [ "$VERSION_FILE" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: VERSION ($VERSION_FILE) != plugin.json version ($PLUGIN_VERSION)" >&2
            echo "  Bump plugins/clauck/.claude-plugin/plugin.json to match VERSION." >&2
            exit 1
          fi
          if [ "$VERSION_FILE" != "$MARKETPLACE_VERSION" ]; then
            echo "ERROR: VERSION ($VERSION_FILE) != marketplace.json plugin version ($MARKETPLACE_VERSION)" >&2
            echo "  Bump .claude-plugin/marketplace.json plugins[clauck].version to match VERSION." >&2
            exit 1
          fi
          echo "All three versions match"

  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check shell scripts
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n lib/run-job.sh
          bash -n lib/trigger-job.sh
          bash -n lib/update-check.sh
          bash -n plugins/clauck/hooks/sessionstart.sh
          bash -n plugins/clauck/bin/clauck-mcp-launcher
          echo "All shell scripts pass syntax check"

      - name: Parse-check Python
        run: |
          /usr/bin/python3 -c "import ast; ast.parse(open('lib/scheduler.py').read())"
          /usr/bin/python3 -c "import ast; ast.parse(open('lib/dag-runner.py').read())"
          /usr/bin/python3 -c "import ast; ast.parse(open('lib/clauck').read())"
          /usr/bin/python3 -c "import ast; ast.parse(open('lib/sizing.py').read())"
          echo "All Python files parse cleanly"

      - name: Validate JSON
        run: |
          /usr/bin/python3 -c "import json; json.load(open('marketplace/index.json'))"
          /usr/bin/python3 -c "import json; json.load(open('plugins/clauck/.claude-plugin/plugin.json'))"
          /usr/bin/python3 -c "import json; json.load(open('plugins/clauck/.mcp.json'))"
          /usr/bin/python3 -c "import json; json.load(open('plugins/clauck/hooks/hooks.json'))"
          /usr/bin/python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "All JSON files valid"

      - name: Check for secrets
        run: |
          # Fail if common secret patterns appear in tracked files (excluding this CI file)
          if git grep -lE '(ghp_|gho_|sk-proj-|xoxb-|xoxp-|AKIA[0-9A-Z])' -- ':!.github/workflows/ci.yml'; then
            echo "Potential secret found in tracked files!"
            exit 1
          fi
          echo "No secrets detected"

      - name: Unit tests
        run: |
          /usr/bin/python3 -m unittest discover tests -v
          echo "All unit tests passed"

      - name: Dry-run install
        run: |
          bash install.sh --dry-run --yes 2>&1 | tail -20
          echo "Dry-run passed"
